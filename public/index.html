<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta name="description" content="Headwater — explore Switzerland's rivers, lakes, glaciers, dams and live hydrology data on an interactive map." />
    <link rel="canonical" href="https://headwater.ch/" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://headwater.ch/" />
    <meta property="og:title" content="Headwater - Interactive Swiss Hydrology" />
    <meta property="og:description" content="Explore Switzerland's rivers, lakes, glaciers, dams and live hydrology data on an interactive map." />
    <meta property="og:image" content="https://headwater.ch/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Headwater - Interactive Swiss Hydrology" />
    <meta name="twitter:description" content="Explore Switzerland's rivers, lakes, glaciers, dams and live hydrology data on an interactive map." />
    <meta name="twitter:image" content="https://headwater.ch/og-image.png" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Headwater",
      "url": "https://headwater.ch",
      "description": "Interactive map of Switzerland's hydrological network — rivers, lakes, glaciers, dams and live monitoring data.",
      "applicationCategory": "EducationApplication",
      "operatingSystem": "Web",
      "offers": { "@type": "Offer", "price": "0" }
    }
    </script>
    <style>
      * { margin: 0; padding: 0; }
      html, body, #root { width: 100%; height: 100%; }
      body { background: #333333; }
      .html-loading {
        position: fixed;
        inset: 0;
        background: #333333;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .html-spinner {
        width: 28px;
        height: 28px;
        border: 1px solid rgba(255,255,255,0.12);
        border-top-color: rgba(255,255,255,0.45);
        border-radius: 50%;
        animation: spin 1.2s linear infinite;
      }
      .html-label {
        font-size: 10px;
        letter-spacing: 0.3em;
        color: rgba(255,255,255,0.3);
        font-family: 'JetBrains Mono', 'Fira Code', monospace;
      }
    </style>
    <title>Headwater - Interactive Swiss Hydrology</title>
    <link rel="preload" href="/geodata/outputs/rivers.geojson" as="fetch" crossorigin="anonymous">
    <link rel="preload" href="/geodata/outputs/lakes.geojson" as="fetch" crossorigin="anonymous">
    <link rel="preload" href="/geodata/outputs/glaciers.geojson" as="fetch" crossorigin="anonymous">
  </head>
  <body>
    <noscript>
      <style>#root { display: none; }</style>
      <div class="html-loading">
        <div class="html-spinner"></div>
        <div class="html-label">JAVASCRIPT REQUIRED</div>
      </div>
    </noscript>
    <div id="root">
      <div class="html-loading">
        <div class="html-spinner"></div>
        <div class="html-label">LOADING HEADWATER</div>
      </div>
    </div>
  </body>
</html>
